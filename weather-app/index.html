<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气查询应用</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1><i class="fas fa-cloud-sun"></i> 天气查询</h1>
      <p class="subtitle">全球城市实时天气</p>
    </header>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="输入城市名称 (如: Beijing, London, Tokyo)" autofocus>
      <button id="searchBtn"><i class="fas fa-search"></i> 查询</button>
    </div>

    <div id="weatherCard" class="weather-card hidden">
      <div class="weather-main">
        <div class="weather-icon">
          <i id="weatherIcon" class="fas fa-sun"></i>
        </div>
        <div class="weather-info">
          <h2 id="cityName"></h2>
          <div class="temperature">
            <span id="tempValue"></span>
            <span class="temp-unit">°C</span>
          </div>
          <p id="weatherDesc" class="weather-desc"></p>
        </div>
      </div>

      <div class="weather-details">
        <div class="detail-item">
          <i class="fas fa-temperature-low"></i>
          <span class="detail-label">体感温度</span>
          <span id="feelsLike" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <i class="fas fa-tint"></i>
          <span class="detail-label">湿度</span>
          <span id="humidity" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <i class="fas fa-wind"></i>
          <span class="detail-label">风速</span>
          <span id="windSpeed" class="detail-value"></span>
        </div>
        <div class="detail-item">
          <i class="fas fa-eye"></i>
          <span class="detail-label">能见度</span>
          <span id="visibility" class="detail-value"></span>
        </div>
      </div>

      <div class="weather-footer">
        <div class="extra-item">
          <i class="fas fa-sun"></i>
          <span>日出 <span id="sunrise"></span></span>
        </div>
        <div class="extra-item">
          <i class="fas fa-moon"></i>
          <span>日落 <span id="sunset"></span></span>
        </div>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>正在获取天气数据...</p>
    </div>

    <div id="error" class="error hidden">
      <i class="fas fa-exclamation-triangle"></i>
      <p id="errorMsg"></p>
    </div>

    <div class="quick-cities">
      <p>快速查询：</p>
      <div class="city-tags">
        <button class="city-tag" data-city="Beijing">北京</button>
        <button class="city-tag" data-city="Shanghai">上海</button>
        <button class="city-tag" data-city="London">伦敦</button>
        <button class="city-tag" data-city="Tokyo">东京</button>
        <button class="city-tag" data-city="New York">纽约</button>
        <button class="city-tag" data-city="Paris">巴黎</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
